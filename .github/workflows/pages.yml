name: Deploy Next.js site to Pages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/pages.yml"
      - "app/**"
      - "pages/**"
      - "placeholder/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - "tsconfig.json"
      - "postcss.config.*"
      - "tailwind.config.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.preflight.outputs.mode }}
      artifact_path: ${{ steps.preflight.outputs.artifact_path }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Select deployment mode
        id: preflight
        shell: bash
        run: |
          if [[ -f package.json && -f package-lock.json ]]; then
            echo "mode=next" >> "$GITHUB_OUTPUT"
            echo "artifact_path=out" >> "$GITHUB_OUTPUT"
          elif [[ -f package.json || -f package-lock.json ]]; then
            echo "Both package.json and package-lock.json are required for a Next.js build." >&2
            exit 1
          elif [[ -f placeholder/index.html ]]; then
            echo "mode=placeholder" >> "$GITHUB_OUTPUT"
            echo "artifact_path=placeholder" >> "$GITHUB_OUTPUT"
          else
            echo "Neither a complete Next.js project nor placeholder/index.html is available." >&2
            exit 1
          fi

      - name: Set up Node.js
        if: steps.preflight.outputs.mode == 'next'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure Pages
        if: steps.preflight.outputs.mode == 'next'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          static_site_generator: next

      - name: Restore Next.js cache
        if: steps.preflight.outputs.mode == 'next'
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: .next/cache
          key: ${{ runner.os }}-node-24-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx', '**.css', '**.json') }}
          restore-keys: |
            ${{ runner.os }}-node-24-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        if: steps.preflight.outputs.mode == 'next'
        run: npm ci

      - name: Build static export
        if: steps.preflight.outputs.mode == 'next'
        run: npm run build

      - name: Verify Pages artifact
        run: test -f "${{ steps.preflight.outputs.artifact_path }}/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ steps.preflight.outputs.artifact_path }}

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

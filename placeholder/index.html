<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="GoodRequest-Assignment — projekt sa pripravuje."
    />
    <title>GoodRequest-Assignment</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f7f5;
        color: #171717;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        padding: 1.5rem;
        place-items: center;
      }

      main {
        max-width: 48rem;
        text-align: center;
      }

      h1 {
        margin: 0;
        overflow-wrap: anywhere;
        font-size: clamp(2rem, 8vw, 4.5rem);
        font-weight: 650;
        letter-spacing: -0.04em;
        line-height: 1.05;
      }

      p {
        margin: 1rem 0 0;
        color: #5b5b57;
        font-size: clamp(1rem, 2vw, 1.25rem);
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>GoodRequest-Assignment</h1>
      <p>Projekt sa pripravuje.</p>
    </main>
  </body>
</html>
